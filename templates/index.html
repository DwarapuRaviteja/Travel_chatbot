
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelGPT AI</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-mode">

    <!-- Header -->
    <header class="top-bar">

        <div class="logo-section">
            <div class="logo-circle">
                <i class="fa-solid fa-plane"></i>
            </div>

            <div>
                <h1>TravelGPT AI</h1>
                <p>Your Smart Travel Assistant</p>
            </div>
        </div>

        <div class="header-actions">

            <button id="historyBtn" class="icon-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>

            <button id="themeBtn" class="icon-btn">
                <i class="fa-solid fa-moon"></i>
            </button>

        </div>

    </header>

    <!-- History Dropdown -->
    <div id="historyPanel" class="history-panel hidden">

        <div class="history-header">
            <h3>Search History</h3>
        </div>

        <div id="historyList" class="history-list">
            <p class="empty-history">
                No searches yet...
            </p>
        </div>

    </div>

    <!-- Main Chat Area -->
    <main class="chat-wrapper">

        <div id="chatContainer" class="chat-container">

            <!-- Welcome Section -->
            <div class="welcome-box">

                <div class="welcome-icon">
                    ✈️
                </div>

                <h2>Welcome to TravelGPT AI</h2>

                <p>
                    Ask anything about destinations,
                    hotels, routes, travel costs,
                    trip planning, tourism and more.
                </p>

                <div class="suggestions">

                    <button class="suggestion-btn">
                        Plan a Goa Trip
                    </button>

                    <button class="suggestion-btn">
                        Hyderabad to Tirupati
                    </button>

                    <button class="suggestion-btn">
                        Budget Trip to Manali
                    </button>

                    <button class="suggestion-btn">
                        Best Places in Vizag
                    </button>

                </div>

            </div>

        </div>

        <!-- Loading Indicator -->
        <div id="loadingContainer" class="loading-container hidden">

            <div class="spinner"></div>

            <span>TravelGPT is thinking...</span>

        </div>

    </main>

    <!-- Input Section -->
    <div class="input-section">

        <div class="input-container">

            <textarea
                    id="userInput"
                    rows="1"
                    placeholder="Ask about destinations, routes, hotels, travel costs, itineraries..."
            ></textarea>

            <button id="sendBtn" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </div>

    <!-- Templates -->

    <template id="userMessageTemplate">

        <div class="message-row user-row">

            <div class="message user-message">

                <div class="message-header">
                    <i class="fa-solid fa-user"></i>
                    <span>You</span>
                </div>

                <div class="message-content"></div>

            </div>

        </div>

    </template>

    <template id="botMessageTemplate">

        <div class="message-row bot-row">

            <div class="message bot-message">

                <div class="message-header">

                    <i class="fa-solid fa-robot"></i>

                    <span>TravelGPT AI</span>

                    <button class="copy-btn">
                        <i class="fa-regular fa-copy"></i>
                    </button>

                </div>

                <div class="message-content"></div>

            </div>

        </div>

    </template>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
